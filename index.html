<html>
    <head>
        <script>
            //https://paul-laird.github.io/b9is123_2425_tmd3/
            
            function sumMultiples(n, a, b) {
                let result = 0;

                for (let i = 1; i < n; i++) {
                    if (i % a === 0 || i % b === 0) {
                        result += i;
                    }
                }
                return result;
            }
            let result =sumMultiples(10, 3, 5)
            alert(result);

            function f4(a, b, l) {
                let sum = 0;

                for (let i = 0; i < l.length; i++) {
                    if (l[i] % a === 0 || l[i] % b === 0) {
                        sum += l[i];
                    }
                }

                return sum;
            }

            let arr = [1,3,5,7,9,10];
            let results = f4(3,5,arr);

            alert(results);

            function f5(a, l) {
                let sum = 0;

                for (let i = 0; i < l.length; i++) {
                    if (l[i] % a[0] === 0 || l[i] % a[1] === 0) {
                        sum += l[i];
                    }
                }

                return sum;
            }

            let factors = [3,5];
            let numbers = [1,3,5,7,9,10];

            let results2 = f5(factors,numbers);

            alert(results2);

            function f6(a, l) {
                let sum = 0;

                for (let i = 0; i < l.length; i++) {
                    for (let j = 0; j < a.length; j++) {
                        if (l[i] % a[j] === 0) {
                            sum += l[i];
                            break;
                        }
                    }
                }

                return sum;
            }
            let factors2 = [3,5,7];
            let numbers2 = [1,3,5,7,9,10,14];

            let results3 = f6(factors2, numbers2);

            alert(results3);                        
        </script>
    </head>
</html>
