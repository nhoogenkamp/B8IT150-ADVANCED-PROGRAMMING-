<!DOCTYPE html>
// https://www.w3schools.com/jsref/tryit.asp?filename=tryjsref_api_fetch_easy
<html>
<body>
<h1>JavaScript Fetch API</h1>
<h2>The fetch() Method</h2>
<p id="setup">Loading a joke</p>
<p id="punchline">Loading the answer</p>
  
<script>
getJoke("https://official-joke-api.appspot.com/random_joke");

async function getJoke(url) {
  let response = await fetch(url);
  let data = await response.json();

  document.getElementById("setup").innerHTML = data.setup;
  document.getElementById("punchline").innerHTML = data.punchline;
}
</script>

</body>
</html>
