<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <script>
    let handler=()=>{
      alert("Hi");
      rates=fetch("https://open.er-api.com/v6/latest/USD");
      rates.then(resp => resp.json())
      .then(data=>data["rates"]["BRL"])
      .then(rate=>alert("1 USD = "+rate+"BRL"));
    }
  </script>

  
</head>
<body>
  Hello World
  <script scr="/hello.js/test.js"></script>
  <button> onclick="handler()">Press Me!</button>
</body>

</html>
